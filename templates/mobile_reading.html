<!--
文件名: mobile_reading.html
描述: 移动端阅读模式页面，展示中文句子并支持查看答案与翻句。
作用: 作为移动端阅读入口，承接句子 API 与基础交互。
-->
{% extends "base.html" %}

{% block content %}
<div class="reading-page" id="reading-root" data-video-id="{{ video['id'] }}">
    <div class="practice-header">
        <h2>{{ video['title'] }} - 阅读模式</h2>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">返回列表</a>
    </div>

    <div class="reading-container">
        <div class="sentence-display">
            <div class="sentence-label">中文句子</div>
            <p id="reading-chinese" class="chinese-text">加载中...</p>
        </div>

        <div id="reading-answer" class="answer-section" style="display: none;">
            <div class="answer-block">
                <div class="sentence-label">正确答案</div>
                <p id="reading-english" class="answer-text correct-answer"></p>
            </div>
        </div>

        <div class="button-group reading-actions">
            <button id="reading-show-answer" class="btn btn-secondary">查看答案</button>
            <button id="reading-next" class="btn btn-primary">下一句</button>
        </div>

        <div class="navigation">
            <span id="reading-progress" class="progress-text">- / -</span>
        </div>
    </div>
</div>

<script>
// 缓存 DOM 与当前状态，避免重复查询与便于更新展示
const readingRoot = document.getElementById('reading-root');
const videoId = readingRoot.dataset.videoId;
let sentences = [];
let currentIndex = 0;

// 根据当前索引刷新中文、进度与按钮状态
function updateReadingDisplay() {
    const sentence = sentences[currentIndex];
    document.getElementById('reading-chinese').textContent = sentence.chinese;
    document.getElementById('reading-answer').style.display = 'none';
    document.getElementById('reading-show-answer').textContent = '查看答案';
    document.getElementById('reading-progress').textContent = `${currentIndex + 1} / ${sentences.length}`;
    document.getElementById('reading-next').disabled = currentIndex >= sentences.length - 1;
}

// 从服务端读取句子列表并初始化首句显示
async function loadSentences() {
    try {
        // 复用句子 API 获取数据
        const response = await fetch(`/api/videos/${videoId}/sentences`);
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || '加载句子失败');
        }
        sentences = data.sentences || [];
        if (!sentences.length) {
            document.getElementById('reading-chinese').textContent = '未找到句子';
            document.getElementById('reading-show-answer').disabled = true;
            document.getElementById('reading-next').disabled = true;
            return;
        }
        updateReadingDisplay();
    } catch (error) {
        document.getElementById('reading-chinese').textContent = `加载失败：${error.message}`;
        document.getElementById('reading-show-answer').disabled = true;
        document.getElementById('reading-next').disabled = true;
    }
}

// 绑定查看答案按钮，点击后显示英文原文
document.getElementById('reading-show-answer').addEventListener('click', function() {
    const answerSection = document.getElementById('reading-answer');
    const isVisible = answerSection.style.display === 'block';
    if (isVisible) {
        answerSection.style.display = 'none';
        this.textContent = '查看答案';
        return;
    }
    document.getElementById('reading-english').textContent = sentences[currentIndex].english;
    answerSection.style.display = 'block';
    this.textContent = '隐藏答案';
});

// 绑定下一句按钮，用于向后翻句
document.getElementById('reading-next').addEventListener('click', function() {
    if (currentIndex < sentences.length - 1) {
        currentIndex += 1;
        updateReadingDisplay();
    }
});

// 页面加载完成后拉取句子数据
loadSentences();
</script>
{% endblock %}
